name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit and secret scanner
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit detect-secrets

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  backend-quality:
    name: Backend tests + coverage + migration checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r provisioning-api/requirements.txt -r provisioning-api/requirements-dev.txt

      - name: Alembic upgrade and drift check
        env:
          DATABASE_URL: sqlite:////tmp/erp_saas_ci.db
          ENVIRONMENT: test
          JWT_SECRET_KEY: ci-secret-key
          REDIS_URL: redis://localhost:6379/15
          RATE_LIMIT_STORAGE_URL: memory://
        run: |
          cd provisioning-api
          alembic upgrade head
          alembic check || { echo "::error::Schema drift detected — add a migration"; exit 1; }

      - name: Backend unit/integration tests with coverage gate (>=70%)
        env:
          ENVIRONMENT: test
          DATABASE_URL: sqlite:////tmp/erp_saas_pytest.db
          BENCH_EXEC_MODE: mock
          JWT_SECRET_KEY: ci-secret-key
          REDIS_URL: redis://localhost:6379/15
          RATE_LIMIT_STORAGE_URL: memory://
          SAAS_UI_ORIGINS: http://testserver,http://localhost:3000
          PYTHONPATH: provisioning-api
        run: |
          cd provisioning-api
          pytest tests \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Backend import boundary gate
        env:
          PYTHONPATH: provisioning-api
        run: |
          python provisioning-api/tools/check_import_boundaries.py

      - name: Shell script safety tests
        run: bash tests/scripts/test_script_safety.sh

  frontend-quality:
    name: Frontend deterministic quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: saas-ui/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd saas-ui
          npm ci

      - name: Install Playwright Chromium runtime
        run: |
          cd saas-ui
          npx playwright install --with-deps chromium

      - name: Frontend E2E gate (Playwright, fail-fast)
        env:
          CI: "true"
        run: |
          cd saas-ui
          npm run e2e -- --project=chromium --max-failures=1 --workers=1

      - name: Frontend lint (non-interactive)
        run: |
          cd saas-ui
          npm run lint

      - name: Frontend typecheck
        run: |
          cd saas-ui
          npm run typecheck

      - name: Frontend route-guard regression tests
        run: |
          cd saas-ui
          npm run test:route-guards

      - name: Frontend contracts regression tests
        run: |
          cd saas-ui
          npm run test:contracts

      - name: Frontend import boundary gate
        run: |
          cd saas-ui
          npm run check:boundaries

  docker-builds:
    name: Docker build validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build provisioning API image
        run: docker build -t erp-saas-provisioning-api-ci ./provisioning-api

      - name: Build SaaS UI image
        run: docker build -t erp-saas-ui-ci ./saas-ui

  deploy-production:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - pre-commit
      - backend-quality
      - frontend-quality
      - docker-builds
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    environment: production
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image metadata
        id: meta
        run: |
          IMAGE_TAG="${GITHUB_SHA::12}"
          API_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/erp-saas-api:${IMAGE_TAG}"
          API_IMAGE_LATEST="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/erp-saas-api:latest"
          UI_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/erp-saas-ui:${IMAGE_TAG}"
          UI_IMAGE_LATEST="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/erp-saas-ui:latest"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "api_image=${API_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "api_image_latest=${API_IMAGE_LATEST}" >> "$GITHUB_OUTPUT"
          echo "ui_image=${UI_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "ui_image_latest=${UI_IMAGE_LATEST}" >> "$GITHUB_OUTPUT"

      - name: OIDC-ready auth placeholder
        run: |
          echo "OIDC is enabled for this job (id-token: write)."
          echo "If your production target requires cloud auth, add provider-specific OIDC action here."

      - name: Validate production deployment configuration
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
          PROD_DEPLOY_PATH: ${{ vars.PROD_DEPLOY_PATH }}
          PROD_HEALTHCHECK_URL: ${{ vars.PROD_HEALTHCHECK_URL }}
          PROD_UI_HEALTHCHECK_URL: ${{ vars.PROD_UI_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          missing=()
          for key in PROD_SSH_HOST PROD_SSH_USER PROD_SSH_PRIVATE_KEY PROD_SSH_KNOWN_HOSTS PROD_DEPLOY_PATH PROD_HEALTHCHECK_URL PROD_UI_HEALTHCHECK_URL; do
            if [ -z "${!key:-}" ]; then
              missing+=("${key}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required production secrets/vars: ${missing[*]}"
            echo "Configure secrets: PROD_SSH_HOST, PROD_SSH_USER, PROD_SSH_PRIVATE_KEY, PROD_SSH_KNOWN_HOSTS"
            echo "Configure vars: PROD_DEPLOY_PATH, PROD_HEALTHCHECK_URL, PROD_UI_HEALTHCHECK_URL (optional PROD_COMPOSE_FILE)"
            exit 1
          fi

      - name: Login to GHCR with GitHub token
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build and push provisioning API image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.api_image }}" \
            -t "${{ steps.meta.outputs.api_image_latest }}" \
            ./provisioning-api
          docker push "${{ steps.meta.outputs.api_image }}"
          docker push "${{ steps.meta.outputs.api_image_latest }}"

      - name: Build and push SaaS UI image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.ui_image }}" \
            -t "${{ steps.meta.outputs.ui_image_latest }}" \
            ./saas-ui
          docker push "${{ steps.meta.outputs.ui_image }}"
          docker push "${{ steps.meta.outputs.ui_image_latest }}"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Configure SSH known hosts
        env:
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "${PROD_SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Create pre-migration production database backup
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
        run: |
          set -euo pipefail
          ssh "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "mkdir -p /var/backups \
            && pg_dump -Fc erp_saas > /var/backups/erp_saas_pre_deploy_$(date +%Y%m%d_%H%M%S).dump \
            && echo 'Backup complete'"

      - name: Roll out on production host
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_DEPLOY_PATH: ${{ vars.PROD_DEPLOY_PATH }}
          PROD_COMPOSE_FILE: ${{ vars.PROD_COMPOSE_FILE }}
          API_IMAGE: ${{ steps.meta.outputs.api_image }}
          UI_IMAGE: ${{ steps.meta.outputs.ui_image }}
        run: |
          set -euo pipefail
          compose_file="${PROD_COMPOSE_FILE:-docker-compose.yml}"
          ssh "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "cd '${PROD_DEPLOY_PATH}' \
            && export ERP_SAAS_API_IMAGE='${API_IMAGE}' ERP_SAAS_UI_IMAGE='${UI_IMAGE}' \
            && docker compose -f '${compose_file}' pull api worker saas-ui \
            && docker compose -f '${compose_file}' up -d api worker saas-ui \
            && docker compose -f '${compose_file}' exec -T api alembic upgrade head"

      - name: Post-deploy smoke checks
        env:
          PROD_HEALTHCHECK_URL: ${{ vars.PROD_HEALTHCHECK_URL }}
          PROD_UI_HEALTHCHECK_URL: ${{ vars.PROD_UI_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          curl -fsS "${PROD_HEALTHCHECK_URL}"
          curl -fsSI "${PROD_UI_HEALTHCHECK_URL}"

      - name: Rollback placeholder (manual follow-up)
        if: failure()
        run: |
          echo "::warning::Deployment failed after rollout attempt."
          echo "Manual rollback placeholder:"
          echo "1) Identify previous working image tags in GHCR."
          echo "2) On production host, set ERP_SAAS_API_IMAGE and ERP_SAAS_UI_IMAGE to previous tags."
          echo "3) Re-run: docker compose -f <compose-file> up -d api worker saas-ui"
          echo "4) Re-run smoke checks and capture incident notes."
